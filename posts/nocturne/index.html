		<div class="markdown">
			<p>建筑生长，而</p>
<p>人群逐渐下沉</p>
<p>一缕鸟鸣在霓虹灯中盘旋而上</p>
<p> </p>
<p>楼层的增长比年龄更急促</p>
<p>衰老更甚</p>
<p>停滞赋予闲人虚幻的安全感</p>
<p> </p>
<p>世界与我相拥，而</p>
<p>我与人群相互失去</p>
<p>一组意象在怪节奏中跌落而下</p>
<p> </p>
<p>捡拾一些、再丢弃一些</p>
<p>黑夜像沉重的乐章</p>
<p>我是其中最轻盈的一个音符</p>
